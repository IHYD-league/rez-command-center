[build]
  command = "npm run build"
  publish = "docs"

[functions]
  directory = "netlify/functions"

# Friendlier URL than /.netlify/functions/itunes-search. Must come
# BEFORE the SPA catch-all so the function route wins.
[[redirects]]
  from = "/api/itunes-search"
  to = "/.netlify/functions/itunes-search"
  status = 200

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/vision-parse"
  to = "/.netlify/functions/vision-parse"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
